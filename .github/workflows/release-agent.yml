name: Release — miseban-agent (all platforms)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────────────────────
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: miseban-agent-linux-x86_64
            cross: false
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: miseban-agent-linux-arm64
            cross: true
          - target: arm-unknown-linux-musleabihf
            os: ubuntu-latest
            artifact: miseban-agent-linux-armv7   # Raspberry Pi 2/3/4 32-bit
            cross: true
          # ── macOS ──────────────────────────────────────────────────────────
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: miseban-agent-macos-arm64
            cross: false
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: miseban-agent-macos-x86_64
            cross: false
          # ── Windows ────────────────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: miseban-agent-windows-x86_64
            cross: false
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: miseban-agent-windows-arm64
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      # musl target needs musl-tools on Ubuntu
      - name: Install musl tools (Linux)
        if: runner.os == 'Linux' && matrix.cross == false
        run: sudo apt-get install -y musl-tools

      # cross for ARM Linux cross-compilation
      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --locked

      # Build
      - name: Build (native)
        if: matrix.cross == false
        run: cargo build --release --package agent --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --package agent --target ${{ matrix.target }}

      # Package
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          BINARY=target/${{ matrix.target }}/release/miseban-agent
          chmod +x "$BINARY"
          tar -czf "${{ matrix.artifact }}.tar.gz" -C "$(dirname $BINARY)" miseban-agent
          sha256sum "${{ matrix.artifact }}.tar.gz" > "${{ matrix.artifact }}.tar.gz.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = "target\${{ matrix.target }}\release\miseban-agent.exe"
          Compress-Archive -Path $src -DestinationPath "${{ matrix.artifact }}.zip"
          $hash = (Get-FileHash "${{ matrix.artifact }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}.zip" | Out-File "${{ matrix.artifact }}.zip.sha256"

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.zip.sha256

  # macOS universal binary
  macos-universal:
    name: macOS Universal Binary
    runs-on: macos-14
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download arm64
        uses: actions/download-artifact@v4
        with:
          name: miseban-agent-macos-arm64
          path: arm64/

      - name: Download x86_64
        uses: actions/download-artifact@v4
        with:
          name: miseban-agent-macos-x86_64
          path: x86_64/

      - name: Create universal binary
        run: |
          tar -xzf arm64/miseban-agent-macos-arm64.tar.gz -C arm64/
          tar -xzf x86_64/miseban-agent-macos-x86_64.tar.gz -C x86_64/
          lipo -create -output miseban-agent \
            arm64/miseban-agent \
            x86_64/miseban-agent
          chmod +x miseban-agent
          tar -czf miseban-agent-macos-universal.tar.gz miseban-agent
          sha256sum miseban-agent-macos-universal.tar.gz > miseban-agent-macos-universal.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: miseban-agent-macos-universal
          path: |
            miseban-agent-macos-universal.tar.gz
            miseban-agent-macos-universal.tar.gz.sha256

  # GitHub Release
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, macos-universal]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate combined SHA256SUMS
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS
          echo "=== SHA256SUMS ===" && cat SHA256SUMS

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          [ -z "$TAG" ] && TAG="${{ github.event.inputs.tag }}"

          gh release create "$TAG" \
            --title "miseban-agent $TAG" \
            --notes "## インストール方法

          ### macOS
          \`\`\`bash
          curl -fsSL https://misebanai.com/install.sh | bash
          \`\`\`

          ### Linux (x86_64)
          \`\`\`bash
          curl -fsSL https://github.com/yukihamada/miseban-ai/releases/download/$TAG/miseban-agent-linux-x86_64.tar.gz | tar xz
          sudo mv miseban-agent /usr/local/bin/
          \`\`\`

          ### Raspberry Pi (arm64)
          \`\`\`bash
          curl -fsSL https://github.com/yukihamada/miseban-ai/releases/download/$TAG/miseban-agent-linux-arm64.tar.gz | tar xz
          sudo mv miseban-agent /usr/local/bin/
          \`\`\`

          ### Windows
          Download \`miseban-agent-windows-x86_64.zip\` below.

          ---
          ffmpeg が必要です: https://ffmpeg.org/download.html" \
            dist/*.tar.gz dist/*.zip dist/SHA256SUMS
